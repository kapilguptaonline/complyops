  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"bf6b4cce-ea2f-4918-ae0b-bf53a074e3f8\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n*{box-sizing:border-box}\nhtml,body{margin:0;padding:0;background:#dadada;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;color:#3a3a3a}\n::-webkit-scrollbar{width:10px;height:10px}\n::-webkit-scrollbar-thumb{background:#c2c2c2;border-radius:5px}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div style=\"height:100vh;display:flex;flex-direction:column;background:#dadada\">\n\n  <!-- ============ PROTOTYPE TOOLBAR (chrome, not part of product) ============ -->\n  <div style=\"flex:none;height:48px;background:#33373b;display:flex;align-items:center;justify-content:space-between;padding:0 16px;color:#e8e8e8\">\n    <div style=\"display:flex;align-items:center;gap:12px\">\n      <div style=\"width:18px;height:18px;border:2px solid #8b94a0;border-radius:3px\"><\u002Fdiv>\n      <span style=\"font:600 12px/1 ui-monospace,Menlo,monospace;letter-spacing:.06em;color:#cfd4da\">COMPLIANCE OPS — LO-FI WIREFRAME · CORE SPINE<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:14px\">\n      <span style=\"font:10px/1 ui-monospace,Menlo,monospace;letter-spacing:.08em;color:#7e858d\">VIEW AS<\u002Fspan>\n      <div style=\"display:flex;border:1px solid #4a5160;border-radius:5px;overflow:hidden\">\n        <button onclick=\"{{ selAdmin }}\" style=\"border:none;padding:7px 14px;font:600 12px sans-serif;cursor:pointer;background:{{ segAdmin.bg }};color:{{ segAdmin.fg }}\">Admin<\u002Fbutton>\n        <button onclick=\"{{ selMgr }}\" style=\"border:none;border-left:1px solid #4a5160;padding:7px 14px;font:600 12px sans-serif;cursor:pointer;background:{{ segMgr.bg }};color:{{ segMgr.fg }}\">Manager<\u002Fbutton>\n        <button onclick=\"{{ selExec }}\" style=\"border:none;border-left:1px solid #4a5160;padding:7px 14px;font:600 12px sans-serif;cursor:pointer;background:{{ segExec.bg }};color:{{ segExec.fg }}\">Executive<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"width:1px;height:22px;background:#4a5160\"><\u002Fdiv>\n      <button onclick=\"{{ selPortal }}\" style=\"border:1px solid #4a5160;border-radius:5px;padding:7px 14px;font:600 12px sans-serif;cursor:pointer;background:{{ segPortal.bg }};color:{{ segPortal.fg }}\">Client Portal<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ APP AREA ============ -->\n  <div style=\"flex:1;min-height:0;display:flex;background:#eef0f1\">\n\n    <!-- ============ INTERNAL APP SHELL ============ -->\n    <sc-if value=\"{{ internalMode }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"flex:1;min-height:0;display:flex\">\n\n      <!-- SIDEBAR -->\n      <div style=\"flex:none;width:244px;background:#f6f6f6;border-right:1px solid #d2d2d2;display:flex;flex-direction:column;min-height:0\">\n        <div style=\"flex:none;padding:16px;border-bottom:1px solid #e2e2e2;display:flex;align-items:center;gap:10px\">\n          <div style=\"width:30px;height:30px;background:#dcdcdc;border:1px solid #cfcfcf;border-radius:5px\"><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:3px\">\n            <div style=\"font:700 13px sans-serif;color:#4a4a4a\">ComplyOps<\u002Fdiv>\n            <div style=\"font:9px/1 ui-monospace,Menlo,monospace;letter-spacing:.06em;color:#9a9a9a;text-transform:uppercase\">Operations Platform<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;overflow-y:auto;padding:6px 0\">\n          <sc-for list=\"{{ navItems }}\" as=\"item\" hint-placeholder-count=\"9\">\n            <div onclick=\"{{ item.onClick }}\" style=\"display:flex;align-items:center;justify-content:space-between;padding:{{ item.pad }};font-size:{{ item.fz }};font-weight:{{ item.wt }};color:{{ item.col }};letter-spacing:{{ item.ls }};text-transform:{{ item.tt }};cursor:{{ item.cur }};opacity:{{ item.op }};border-left:3px solid {{ item.bord }};background:{{ item.bg }};user-select:none\">\n              <span>{{ item.label }}<\u002Fspan>\n              <span style=\"font:8px/1 ui-monospace,monospace;color:#b3b3b3\">{{ item.tag }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"flex:none;padding:12px 16px;border-top:1px solid #e2e2e2;display:flex;align-items:center;gap:10px\">\n          <div style=\"width:28px;height:28px;border-radius:50%;background:#dcdcdc;border:1px solid #cfcfcf\"><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:3px\">\n            <div style=\"height:8px;width:78px;background:#e0e0e0;border-radius:2px\"><\u002Fdiv>\n            <div style=\"font:9px/1 ui-monospace,monospace;letter-spacing:.06em;color:#8e98a6;text-transform:uppercase\">Role · {{ roleLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- MAIN -->\n      <div style=\"flex:1;min-width:0;min-height:0;display:flex;flex-direction:column;background:#eef0f1\">\n        <!-- TOPBAR -->\n        <div style=\"flex:none;height:54px;background:#fff;border-bottom:1px solid #d8d8d8;display:flex;align-items:center;justify-content:space-between;padding:0 22px\">\n          <div style=\"font:12px/1 ui-monospace,Menlo,monospace;letter-spacing:.04em;color:#8a8a8a\">{{ crumb }}<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:14px\">\n            <div style=\"width:230px;height:30px;background:#f0f0f0;border:1px solid #dcdcdc;border-radius:5px;display:flex;align-items:center;padding:0 10px;gap:8px\">\n              <div style=\"width:12px;height:12px;border:1.5px solid #b8b8b8;border-radius:50%\"><\u002Fdiv>\n              <div style=\"font:11px sans-serif;color:#aeaeae\">Search clients, services, tasks…<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"width:30px;height:30px;border lay:flex;align-items:center;justify-content:space-between;padding:0 12px\"><span style=\"font:11px sans-serif;color:#9a9a9a\">Switch entity<\u002Fspan><span style=\"color:#bdbdbd\">▾<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <!-- alert banner -->\n          <div style=\"background:#f4eeea;border:1px solid #e4d6cc;border-radius:6px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:18px\">\n            <div style=\"display:flex;align-items:center;gap:12px\"><div style=\"width:9px;height:9px;border-radius:50%;background:#c79a7d\"><\u002Fdiv><span style=\"font:13px sans-serif;color:#8a6f5e\">1 invoice outstanding · due soon<\u002Fspan><\u002Fdiv>\n            <button style=\"border:1px solid #b78c6e;background:#fff;color:#9a7458;border-radius:5px;padding:7px 16px;font:600 12px sans-serif;cursor:pointer\">Pay now<\u002Fbutton>\n          <\u002Fdiv>\n          <!-- status tiles -->\n          <div style=\"display:flex;gap:14px;margin-bottom:18px;flex-wrap:wrap\">\n            <div style=\"flex:1;min-width:170px;background:#fff;border:1px solid #d8d8d8;border-radius:6px;padding:16px;display:flex;flex-direction:column;gap:9px\"><div style=\"font:600 10px/1.2 ui-monospace,monospace;letter-spacing:.06em;color:#8a8a8a;text-transform:uppercase\">Active services<\u002Fdiv><div style=\"height:24px;width:44px;background:#e1e1e1;border-radius:2px\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"flex:1;min-width:170px;background:#fff;border:1px solid #d8d8d8;border-radius:6px;padding:16px;display:flex;flex-direction:column;gap:9px\"><div style=\"font:600 10px/1.2 ui-monospace,monospace;letter-spacing:.06em;color:#8a8a8a;text-transform:uppercase\">Compliance up-to-date<\u002Fdiv><div style=\"height:24px;width:60px;background:#e1e1e1;border-radius:2px\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"flex:1;min-width:170px;background:#fff;border:1px solid #d8d8d8;border-radius:6px;padding:16px;display:flex;flex-direction:column;gap:9px\"><div style=\"font:600 10px/1.2 ui-monospace,monospace;letter-spacing:.06em;color:#8a8a8a;text-transform:uppercase\">Documents requested<\u002Fdiv><div style=\"height:24px;width:40px;background:#e1e1e1;border-radius:2px\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"flex:1;min-width:170px;background:#fff;border:1px solid #d8d8d8;border-radius:6px;padding:16px;display:flex;flex-direction:column;gap:9px\"><div style=\"font:600 10px/1.2 ui-monospace,monospace;letter-spacing:.06em;color:#8a8a8a;text-transform:uppercase\">Next due date<\u002Fdiv><div style=\"height:24px;width:74px;background:#e1e1e1;border-radius:2px\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1.4fr 1fr;gap:14px\">\n            <div style=\"background:#fff;border:1px solid #d8d8d8;border-radius:6px;padding:18px\"><div style=\"font:600 13px sans-serif;color:#5a5a5a;margin-bottom:14px\">Upcoming compliance<\u002Fdiv><div><div style=\"display:flex;gap:12px;padding:11px 0;border-bottom:1px solid #f0f0f0\"><div style=\"height:9px;width:38%;background:#e6e6e6;border-radius:2px\"><\u002Fdiv><div style=\"height:9px;width:20%;background:#efefef;border-radius:2px;margin-left:auto\"><\u002Fdiv><div style=\"height:9px;width:58px;background:#e9edf2;border-radius:9px\"><\u002Fdiv><\u002Fdiv><div style=\"display:flex;gap:12px;padding:11px 0;border-bottom:1px solid #f0f0f0\"><div style=\"height:9px;width:30%;background:#e6e6e6;border-radius:2px\"><\u002Fdiv><div style=\"height:9px;width:24%;background:#efefef;border-radius:2px;margin-left:auto\"><\u002Fdiv><div style=\"height:9px;width:58px;background:#e9edf2;border-radius:9px\"><\u002Fdiv><\u002Fdiv><div style=\"display:flex;gap:12px;padding:11px 0;border-bottom:1px solid #f0f0f0\"><div style=\"height:9px;width:44%;background:#e6e6e6;border-radius:2px\"><\u002Fdiv><div style=\"height:9px;width:16%;background:#efefef;border-radius:2px;margin-left:auto\"><\u002Fdiv><div style=\"height:9px;width:58px;background:#e9edf2;border-radius:9px\"><\u002Fdiv><\u002Fdiv><div style=\"display:flex;gap:12px;padding:11px 0\"><div style=\"height:9px;width:34%;background:#e6e6e6;border-radius:2px\"><\u002Fdiv><div style=\"height:9px;width:22%;background:#efefef;border-radius:2px;margin-left:auto\"><\u002Fdiv><div style=\"height:9px;width:58px;background:#e9edf2;border-radius:9px\"><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #d8d8d8;border-radius:6px;padding:18px\"><div style=\"font:600 13px sans-serif;color:#5a5a5a;margin-bottom:14px\">Recent deliverables<\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:10px\"><div style=\"display:flex;align-items:center;gap:10px;padding:9px;border:1px solid #eee;border-radius:5px\"><div style=\"width:26px;height:30px;background:#ededed;border-radius:3px\"><\u002Fdiv><div style=\"flex:1;height:9px;background:#e6e6e6;border-radius:2px\"><\u002Fdiv><span style=\"font:11px ui-monospace,monospace;color:#9aa3b0\">↧<\u002Fspan><\u002Fdiv><div style=\"display:flex;align-items:center;gap:10px;padding:9px;border:1px solid #eee;border-radius:5px\"><div style=\"width:26px;height:30px;background:#ededed;border-radius:3px\"><\u002Fdiv><div style=\"flex:1;height:9px;background:#e6e6e6;border-radius:2px\"><\u002Fdiv><span style=\"font:11px ui-monospace,monospace;color:#9aa3b0\">↧<\u002Fspan><\u002Fdiv><div style=\"display:flex;align-items:center;gap:10px;padding:9px;border:1px solid #eee;border-radius:5px\"><div style=\"width:26px;height:30px;background:#ededed;border-radius:3px\"><\u002Fdiv><div style=\"flex:1;height:9px;background:#e6e6e6;border-radius:2px\"><\u002Fdiv><span style=\"font:11px ui-monospace,monospace;color:#9aa3b0\">↧<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- PORTAL DOCUMENTS -->\n        <sc-if value=\"{{ showPDocs }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"max-width:1000px;margin:0 auto\">\n          <div style=\"font:700 22px sans-serif;color:#3a3a3a;margin-bottom:4px\">Documents<\u002Fdiv>\n          <div style=\"font:13px sans-serif;color:#8a8a8a;margin-bottom:18px\">Upload what we've requested and download your deliverables<\u002Fdiv>\n          <!-- tabs -->\n          <div style=\"display:flex;gap:0;border-bottom:1px solid #dcdcdc;margin-bottom:20px\">\n            <div style=\"padding:10px 16px;font:600 13px sans-serif;color:#5d6b82;border-bottom:2px solid #5d6b82;cursor:pointer\">Requested uploads<\u002Fdiv>\n            <div style=\"padding:10px 16px;font:500 13px sans-serif;color:#9a9a9a;cursor:pointer\">Deliverables<\u002Fdiv>\n            <div style=\"padding:10px 16px;font:500 13px sans-serif;color:#9a9a9a;cursor:pointer\">All documents<\u002Fdiv>\n          <\u002Fdiv>\n          <!-- requested items with dropzones -->\n          <div style=\"display:flex;flex-direction:column;gap:12px;margin-bottom:24px\">\n            <div style=\"background:#fff;border:1px solid #d8d8d8;border-radius:6px;padding:16px;display:flex;align-items:center;gap:16px\">\n              <div style=\"flex:1\"><div style=\"height:10px;width:40%;background:#e6e6e6;border-radius:2px;margin-bottom:8px\"><\u002Fdiv><div style=\"font:10px ui-monospace,monospace;color:#b09a86\">DUE IN 3 DAYS<\u002Fdiv><\u002Fdiv>\n              <div style=\"flex:none;width:280px;border:1.5px dashed #c4c4c4;border-radius:6px;padding:14px;text-align:center;background:#fafafa\"><div style=\"font:12px sans-serif;color:#9a9a9a\">Drag file here or <span style=\"color:#5d6b82;font-weight:600\">browse<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #d8d8d8;border-radius:6px;padding:16px;display:flex;align-items:center;gap:16px\">\n              <div style=\"flex:1\"><div style=\"height:10px;width:48%;background:#e6e6e6;border-radius:2px;margin-bottom:8px\"><\u002Fdiv><div style=\"font:10px ui-monospace,monospace;color:#aab2bf\">DUE NEXT WEEK<\u002Fdiv><\u002Fdiv>\n              <div style=\"flex:none;width:280px;border:1.5px dashed #c4c4c4;border-radius:6px;padding:14px;text-align:center;background:#fafafa\"><div style=\"font:12px sans-serif;color:#9a9a9a\">Drag file here or <span style=\"color:#5d6b82;font-weight:600\">browse<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #d8d8d8;border-radius:6px;padding:16px;display:flex;align-items:center;gap:16px\">\n              <div style=\"flex:1\"><div style=\"height:10px;width:36%;background:#e6e6e6;border-radius:2px;margin-bottom:8px\"><\u002Fdiv><div style=\"font:10px ui-monospace,monospace;color:#9a9a9a;display:flex;align-items:center;gap:6px\"><span style=\"color:#8fae8f\">✓<\u002Fspan> UPLOADED<\u002Fdiv><\u002Fdiv>\n              <div style=\"flex:none;width:280px;display:flex;align-items:center;gap:10px;padding:12px;border:1px solid #eee;border-radius:6px\"><div style=\"width:24px;height:28px;background:#ededed;border-radius:3px\"><\u002Fdiv><div style=\"flex:1;height:9px;background:#e6e6e6;border-radius:2px\"><\u002Fdiv><span style=\"color:#c8c8c8\">✕<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- expiring -->\n          <div style=\"background:#fff;border:1px solid #d8d8d8;border-radius:6px;padding:18px\">\n            <div style=\"font:600 13px sans-serif;color:#5a5a5a;margin-bottom:14px\">Documents expiring soon<\u002Fdiv>\n            <div><div style=\"display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #f0f0f0;align-items:center\"><div style=\"height:9px;width:30%;background:#e6e6e6;border-radius:2px\"><\u002Fdiv><div style=\"height:9px;width:18%;background:#efefef;border-radius:2px;margin-left:auto\"><\u002Fdiv><div style=\"height:9px;width:60px;background:#f0e7df;border-radius:9px\"><\u002Fdiv><\u002Fdiv><div style=\"display:flex;gap:12px;padding:10px 0;align-items:center\"><div style=\"height:9px;width:26%;background:#e6e6e6;border-radius:2px\"><\u002Fdiv><div style=\"height:9px;width:22%;background:#efefef;border-radius:2px;margin-left:auto\"><\u002Fdiv><div style=\"height:9px;width:60px;background:#e9edf2;border-radius:9px\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:820},&quot;initialRole&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;admin&quot;,&quot;manager&quot;,&quot;executive&quot;],&quot;default&quot;:&quot;admin&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    const r = ['admin','manager','executive'].includes(props.initialRole) ? props.initialRole : 'admin';\n    this.state = { mode:'internal', role:r, screen:'dash', pscreen:'p_dash', stubTitle:'' };\n  }\n\n  allowed(role){\n    if(role==='admin') return ['dash','onboard','subscribe','reports','config','stub'];\n    if(role==='manager') return ['dash','onboard','subscribe','reports','stub'];\n    return ['dash','stub'];\n  }\n\n  setRole(r){\n    if(r==='portal'){ this.setState({ mode:'portal' }); return; }\n    const allow = this.allowed(r);\n    this.setState(s => ({ mode:'internal', role:r, screen: allow.includes(s.screen) ? s.screen : 'dash' }));\n  }\n\n  go(screen, title){ this.setState({ screen, stubTitle: title || '' }); }\n  pgo(s){ this.setState({ pscreen:s }); }\n\n  buildNav(role, screen){\n    const link = (label, scr) => ({ label, kind:'link', screen:scr });\n    const stub = (label) => ({ label, kind:'stub' });\n    const header = (label) => ({ label, kind:'header' });\n    let items = [];\n    items.push(link('Dashboard','dash'));\n    if(role==='admin' || role==='manager'){\n      items.push(header('Clients'));\n      items.push({ ...link('New Client','onboard'), indent:true });\n      items.push({ ...link('New Service Subscription','subscribe'), indent:true });\n      items.push(stub('Compliance & Renewals'));\n      items.push(stub('Tasks & Workflow'));\n      items.push(stub('Billing & Revenue'));\n      items.push(stub('Documents & DSC'));\n      items.push(link('Reports & Analytics','reports'));\n      items.push(stub('Resources & Capacity'));\n    }\n    if(role==='admin'){\n      items.push(header('Configuration'));\n      items.push({ ...link('Service Master','config'), indent:true });\n    }\n    if(role==='executive'){\n      items.push(stub('My Tasks'));\n      items.push(stub('My Clients'));\n      items.push(stub('My Compliance'));\n      items.push(stub('Documents'));\n    }\n    return items.map((it, i) => {\n      const isHeader = it.kind==='header';\n      const isStub = it.kind==='stub';\n      const active = it.kind==='link' && it.screen===screen;\n      return {\n        ...it,\n        key:i,\n        tag: it.kind==='link' ? '' : (isStub ? '· soon' : ''),\n        bg: active ? '#e7eaf0' : 'transparent',\n        bord: active ? '#5d6b82' : 'transparent',\n        wt: isHeader ? '600' : (active ? '600' : '450'),\n        op: isStub ? '0.5' : '1',\n        cur: isHeader ? 'default' : 'pointer',\n        pad: it.indent ? '7px 14px 7px 32px' : (isHeader ? '16px 14px 5px 16px' : '8px 14px 8px 16px'),\n        fz: isHeader ? '10px' : '13px',\n        col: isHeader ? '#9aa3b0' : '#4a4a4a',\n        ls: isHeader ? '.08em' : 'normal',\n        tt: isHeader ? 'uppercase' : 'none',\n        onClick: isHeader ? null : (isStub ? () => this.go('stub', it.label) : () => this.go(it.screen))\n      };\n    });\n  }\n\n  renderVals(){\n    const { mode, role, screen, pscreen, stubTitle } = this.state;\n    const internalMode = mode==='internal';\n    const portalMode = mode==='portal';\n    const roleLabel = role.charAt(0).toUpperCase() + role.slice(1);\n    const crumbMap = {\n      dash: 'Home / Dashboard',\n      onboard: 'Clients / New Client',\n      subscribe: 'Clients / New Service Subscription',\n      reports: 'Reports & Analytics',\n      config: 'Configuration / Service Master',\n      stub: stubTitle\n    };\n    const seg = (on) => ({ bg: on ? '#5d6b82' : 'transparent', fg: on ? '#ffffff' : '#cfd4da' });\n    const pseg = (on) => ({ bg: on ? '#eef1f6' : 'transparent', col: on ? '#33373b' : '#7a7a7a', wt: on ? '600' : '450' });\n    return {\n      internalMode, portalMode, role, roleLabel,\n      navItems: this.buildNav(role, screen),\n      crumb: crumbMap[screen] || '',\n      stubTitle,\n      showDash: screen==='dash',\n      showOnboard: screen==='onboard',\n      showSubscribe: screen==='subscribe',\n      showConfig: screen==='config',\n      showReports: screen==='reports',\n      showStub: screen==='stub',\n      dashAdmin: role==='admin',\n      dashManager: role==='manager',\n      dashExec: role==='executive',\n      segAdmin: seg(internalMode && role==='admin'),\n      segMgr: seg(internalMode && role==='manager'),\n      segExec: seg(internalMode && role==='executive'),\n      segPortal: seg(portalMode),\n      selAdmin: () => this.setRole('admin'),\n      selMgr: () => this.setRole('manager'),\n      selExec: () => this.setRole('executive'),\n      selPortal: () => this.setRole('portal'),\n      goDash: () => this.go('dash'),\n      goConfig: () => this.go('config'),\n      showPDash: pscreen==='p_dash',\n      showPDocs: pscreen==='p_docs',\n      pToDash: () => this.pgo('p_dash'),\n      pToDocs: () => this.pgo('p_docs'),\n      pnavDash: pseg(pscreen==='p_dash'),\n      pnavDocs: pseg(pscreen==='p_docs')\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
